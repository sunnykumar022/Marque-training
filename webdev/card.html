<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    #container{
        height: 500px;
        width: 350px;
        border: 1px solid black;
        border-radius: 20px;
        box-sizing:border-box;
        box-shadow: 2px 2px 5px gray;
        margin: 5vw;
    }
    .img-container{
        position: relative;

    }
    img{
        width: 100%;
        height: 250px;
        border-top-left-radius: 20px;
        border-top-right-radius: 20px;
    }
    .details{
        margin:20px;
    }

    h2{
        text-transform: uppercase;
        color: rgb(252, 145, 5);


    }
    h3{
        color: white;
        background-color: black;
        width: 100px;
        border-radius: 10px;
       text-align:  center;
    }
    p{
        font-family: Arial, Helvetica, sans-serif;
        font-size: 16px;
    }
    .like-box{
        position: absolute;
        
        padding: 10px;
        border-radius: 50%;
        
        background: white;
        margin-left: 10px;
        margin-top: 10px;

    }
  </style>
  <body>
    <article id="container">
      <!--section 1   -->
      <sectiion class="img-container">
        <div class="like-box">❤️</div>
        <img
          src="https://tse1.mm.bing.net/th/id/OIP.lTmSRLPfVUJxz76w1rT8eQHaEX?pid=Api&P=0&h=180"
          alt="product image"
        />
      </sectiion>

      <!-- section 2 -->
      <section class="details">
        <h2>Nikon Film Camera</h2>
        <h3>$750 USD</h3>
        <p>
          A person holds a vintage Nikon film camera, poised to capture a shot.
          The blurred background highlights the nostalgic charm of classic
          photography.
        </p>
      </section>
    </article>
  </body>
</html>
