
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2x2 Reviews Grid</title>
    <!-- <link rel="stylesheet" href="app.css"> -->
</head>
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: gilroy, sans-serif;
}

html,
body {
    height: 100vh;
    width: 100vw;
}
.reviews-grid{
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 1rem;
  width: 90%;
  margin: 1rem, auto;
}
.review-card{
  padding: 1rem;
  border-radius: 1rem;
  border: 1px solid grey;
  background-color: ghostwhite;
}
.review-card h3{
  font-size: 20px;
  margin-bottom: 1rem;
}
.review-text{
  font-size: 18px;
  margin-bottom: 1rem;
}
.review-person{
  font-size: 16px;
  font-weight: 700;
}
@media (max-width:1000px){
    body{
        background-color: green;
    }
}
@media (max-width:600px){
    .reviews-grid{
        grid-template-columns: 1fr;
    }
}
@media (max-width:500px){
    body{
        background-color: red;
    }
    .review-card h3{
        display: none;
    }
    .review-card{
        display: flex;
        justify-content: center;
        align-items: center;
        gap:2rem;
    }
}
</style>
<body>
    <div class="reviews-grid">
        <div class="review-card">
            <h3 class="review-heading">Review 1</h3>
            <p class="review-text">"Amazing product! Highly recommend it to everyone!"</p>
            <p class="reivew-person">Alex</p>
        </div>
        <div class="review-card">
            <h3 class="review-heading">Review 2</h3>
            <p class="review-text">"Great value for the price. Delivered quickly."</p>
            <p class="reivew-person">Jamie</p>
        </div>
        <div class="review-card">
            <h3 class="review-heading">Review 3</h3>
            <p class="review-text">"Works as advertised. Would buy again."</p>
            <p class="reivew-person">Taylor</p>
        </div>
        <div class="review-card">
            <h3 class="review-heading">Review 4</h3>
            <p class="review-text">"Not what I expected, but decent quality."</p>
            <p class="reivew-person">Morgan</p>
        </div>
    </div>
</body>
</html>
