<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    :root {
      --card-border-radius: 1rem;
      --heading-font-size: 1.5rem;
      --blue-card-bg: #b6ceda;
      --blue-card-color: #153346;
      --purple-card-bg: #c2b2e5;
      --purple-card-color: #4a255d;
      --pink-card-bg: #f481a2;
      --pink-card-color: #571a4e;
      --green-card-bg: #c7da8f;
      --green-card-color: #193301;
      --yellow-card-bg: #fbde70;
      --yellow-card-color: #594500;
      --orange-card-bg: #f7a274;
      --orange-card-color: #672100;
    }
    .container {
      width: 900px;
      margin: auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: 150px;
      gap: 15px;
    }

    .item {
      border-radius: var(--card-border-radius);
      padding: 20px;
    }

    .item1 {
      background: var(--purple-card-bg);
      grid-column: 1/2;
      grid-row: 1/3;
    }

    .item2 {
      background:var(--pink-card-bg);
      grid-column: 2/5;
      grid-row: 1/2;
    }

    .item3 {
      background: var(--green-card-bg);
      grid-column: 2/3;
      grid-row: 2/3;
    }

    .item4 {
      background:var(--yellow-card-bg);
      grid-column: 3/5;
      grid-row: 2/3;
    }

    .item5 {
      background: var(--orange-card-bg);
      grid-column: 1/4;
      grid-row: 3/4;
    }

    .item6 {
      background: var(--blue-card-bg);
      grid-column: 4/5;
      grid-row: 3/4;
    }
  </style>
  <body>
    <div class="container">
      <div class="item item1">
        <h3>Customization</h3>
      </div>

      <div class="item item2">Scheduling</div>

      <div class="item item3">Wallet</div>

      <div class="item item4">Inbox</div>

      <div class="item item5">Send Gifts</div>

      <div class="item item6">Reminders</div>
    </div>
  </body>
</html>
