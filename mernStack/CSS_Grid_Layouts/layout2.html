  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: gilroy, sans-serif;
    }
    
    html,
    body {
        height: 100vh;
        width: 100vw;
    }
    .grid-container{
      margin: auto;
      width: 600px;
      display: grid;
      grid-template-columns: repeat(3,1fr);
      grid-template-rows: 100px 200px 200px 100px;
      gap: 10px;

    }
    .grid-items{
      background-color:black;
      color: wheat;
    }
    .grid-item-1{
      grid-column: 1/4;
      
    }
    .grid-item-2{
        grid-row: 2/span 2;
    }
    .grid-item-3{
      grid-column:2/span 2;
    }
    .grid-item-6{
      grid-column: 1/span 3;
    }
  </style>
  <body>
    <div class="grid-container">
      <div class="grid-item-1 grid-items">1</div>
      <div class="grid-item-2 grid-items">2</div>
      <div class="grid-item-3 grid-items">3</div>
      <div class="grid-item-4 grid-items">4</div>
      <div class="grid-item-5 grid-items">5</div>
      <div class="grid-item-6 grid-items">6</div>
    </div>
  </body>
