<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Animation</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#a1cba2;
    overflow:hidden;
}

.ground{
    width:90%;
    height:350px;
    position:relative;
    /* border-bottom:5px solid white; */
}

.ball{
    width:90px;
    position:absolute;
    bottom:0;

    animation:
        moveBall 5s linear infinite alternate,
        rotateBall .7s linear infinite;
}

@keyframes moveBall{
    from{
        left:0;
    }
    to{
        left:calc(100% - 90px);
    }
}

@keyframes rotateBall{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}
</style>
