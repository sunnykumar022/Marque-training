<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Document</title>
    <style>
      #box {
        width: 300px;
        height: 100px;
        border-radius: 20px;
        background-color: red;
        transition-property: all;
        transition-duration: 2s;
        transition-delay: 0.5s;
        border: 2px solid blue;
      }
      #box:hover {
        background-color: yellow;
        width: 200px;
        height: 60px;
        border: 5px solid black;
      }
      button {
        color: wheat;
        background-color: blue;
        outline: none;
        border: none;
        border-radius: 20px;
        transition-property: all;
        transition-duration: 2s;
      }
      button:hover {
        background-color: rgb(250, 180, 100);
        scale: 1.1;
      }

      #box1 {
        width: 100px;
        height: 100px;
        background-color: pink;
        animation-name: pop-in-out;
        animation-duration: 2s;
        animation-iteration-count: 2;
      }
      @keyframes pop-in-out {
        0% {
          background-color: white;
          margin-left: 0px;
        }
        25% {
          background-color: red;
          margin-left: 100px;
          margin-top: 0px;
        }
        50% {
          background-color: yellow;
          margin-top: 100px;
          margin-left: 100px;
        }
        75% {
          background-color: aqua;
          margin-top: 100px;
          margin-left: 0px;
        }
        100% {
          background-color: black;
        }
        /* from{
            background-color: white;
            margin-left: 0;
        }
        to{
            background-color: skyblue;
            margin-left: 100px;
            margin-top: 150px;
            margin-bottom: 150px;
        } */
      }
    </style>
  </head>
  <body>
    <div id="box"></div>
    <div id="box1">Animate</div>
    <button type="">Click</button>

   

  </body>
</html>
