<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .container{
        width: 500px;
        height: 600px;
        background-color: purple;
        display: flex;
        justify-content: center;
        
    }
    .box{
        width: 85%;
        height: 75%;
        background-color: white;
        margin-top: 23%;
        border-radius: 10px;
        display: flex;
        justify-content: center;
        flex-direction: column;
        align-items: center;
        
    }
    .card_top{
        display: flex;
        position: relative;
    }
    
    .green-box{
        width: 40px;
        height: 40px;
        background-color: green;
        border-radius: 50%;
        
        position: absolute;
        top: -10px;
        left: 95%;

        
    }
    .card_top img{
        width:280px;
        height: 300px;
        border-radius: 20px;
        
        
    }
</style>
<body>
    <div class="container">
        <div class="box">
            <div class="card_top">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTh_OE4h2r_QrYboBR2KRgMX6nrGcFjq6Dt0q11oe_5Qw&s=10" alt="">
                <div class="green-box"></div>
            </div>
            <div class=card-bottom>
                <div class="bottom_first">
                    <h3>Sophia carter</h3>
                    <p>webdev</p>
                </div>
                <div class="bottom_mid">
                    <div class="post">post</div>
                    <div class="followers">followers</div>
                    <div class="following">following</div>
                </div>
                <div class="bottom_last">
                    <div class="follow-btn">Follow</div>
                    <div class="msg-btn">Message</div>
                </div>
            </div >
        </div>
    </div>
</body>
</html>
